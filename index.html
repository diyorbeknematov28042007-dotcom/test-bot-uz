<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Tizimi</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f4f4f9; color: #333; }
        .step { display: none; }
        .step.active { display: block; }
        
        /* Asosiy inputlar dizayni */
        input[type="text"], input[type="number"], select { 
            width: 100%; padding: 10px; margin: 10px 0; 
            border-radius: 5px; border: 1px solid #ccc; 
            box-sizing: border-box; font-size: 16px;
        }
        button { 
            width: 100%; padding: 12px; margin: 10px 0; 
            background: #0088cc; color: white; border: none; 
            font-weight: bold; border-radius: 5px; font-size: 16px; cursor: pointer;
        }

        /* Test variantlari (A, B, C, D) dizayni */
        #questionsContainer { 
            background: #fff; padding: 10px; 
            border-radius: 5px; border: 1px solid #ccc; 
            margin-bottom: 15px;
        }
        .question-row { 
            display: flex; align-items: center; 
            padding: 12px 0; border-bottom: 1px solid #eee; 
        }
        .question-row:last-child { border-bottom: none; }
        .q-num { font-weight: bold; width: 35px; color: #0088cc; }
        .options { display: flex; flex: 1; justify-content: space-between; }
        .options label { 
            display: flex; align-items: center; 
            cursor: pointer; font-size: 16px; font-weight: bold;
        }
        .options input[type="radio"] { 
            width: auto; margin: 0 5px 0 0; transform: scale(1.3); 
        }
    </style>
</head>
