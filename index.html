<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Bot Uz</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: var(--tg-theme-bg-color, #f4f4f4); color: var(--tg-theme-text-color, #000); }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 10px; margin-top: 10px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background-color: #0088cc; color: white; border: none; font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
        .question-row { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
        .options { display: flex; gap: 10px; }
    </style>
</head>
<body>
    <div class="container" id="step1">
        <h2>Ism Familiyangizni kiriting</h2>
        <input type="text" id="fullName" placeholder="Masalan: Aliyev Vali">
        <button onclick="nextStep()">Keyingisi</button>
    </div>

    <div class="container hidden" id="step2">
        <h2>Test ma'lumotlari</h2>
        <select id="subject">
            <option value="Huquq">Huquq</option>
            <option value="Chet tili">Chet tili</option>
            <option value="IQ">IQ</option>
            <option value="Fizika">Fizika</option>
            <option value="Matematika">Matematika</option>
            <option value="Kimyo">Kimyo</option>
            <option value="Biologiya">Biologiya</option>
            <option value="Tarix">Tarix</option>
        </select>
        <input type="number" id="testCode" placeholder="Test kodi (Masalan: 11)">
        <input type="number" id="testCount" placeholder="Testlar soni (10-90)" min="10" max="90">
        <select id="gradingType">
            <option value="umumiy">Umumiy (1 ball)</option>
            <option value="mahsus">Mahsus (1.1, 2.1, 3.1 ball)</option>
        </select>
        <button onclick="generateTests()">Testni boshlash</button>
    </div>

    <div class="container hidden" id="step3">
        <h2>Javoblarni belgilang</h2>
        <div id="testArea"></div>
        <button onclick="submitTest()">Botga jo'natish</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function nextStep() {
            let name = document.getElementById('fullName').value;
            if(name.length < 3) return alert("Ismingizni to'liq kiriting!");
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
        }

        function generateTests() {
            let count = document.getElementById('testCount').value;
            if(count < 10 || count > 90) return alert("Testlar soni 10 dan 90 gacha bo'lishi kerak!");
            
            let area = document.getElementById('testArea');
            area.innerHTML = '';
            for(let i = 1; i <= count; i++) {
                area.innerHTML += `
                    <div class="question-row">
                        <span>${i}.</span>
                        <div class="options">
                            <label><input type="radio" name="q${i}" value="A"> A</label>
                            <label><input type="radio" name="q${i}" value="B"> B</label>
                            <label><input type="radio" name="q${i}" value="C"> C</label>
                            <label><input type="radio" name="q${i}" value="D"> D</label>
                        </div>
                    </div>
                `;
            }
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step3').classList.remove('hidden');
        }

        function submitTest() {
            let count = document.getElementById('testCount').value;
            let answers = [];
            for(let i = 1; i <= count; i++) {
                let selected = document.querySelector(`input[name="q${i}"]:checked`);
                answers.push(selected ? selected.value : null);
            }
            
            let data = {
                fullName: document.getElementById('fullName').value,
                subject: document.getElementById('subject').value,
                testCode: document.getElementById('testCode').value,
                gradingType: document.getElementById('gradingType').value,
                answers: answers
            };

            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
