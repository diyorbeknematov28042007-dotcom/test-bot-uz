<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Tizimi</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: Arial; padding: 20px; background: #f4f4f9; }
        .step { display: none; }
        .step.active { display: block; }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; }
        button { background: #0088cc; color: white; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <div id="step1" class="step active">
        <h3>Ism va Familiyangizni kiriting</h3>
        <input type="text" id="fullName" placeholder="Masalan: Aliyev Vali">
        <button onclick="nextStep(2)">Keyingi</button>
    </div>

    <div id="step2" class="step">
        <h3>Fan va Test Kodini tanlang</h3>
        <select id="subject">
            <option value="Huquq">Huquq</option>
            <option value="Chet tili">Chet tili</option>
            <option value="IQ">IQ</option>
            <option value="Fizika">Fizika</option>
            <option value="Matematika">Matematika</option>
            <option value="Kimyo">Kimyo</option>
            <option value="Biologiya">Biologiya</option>
            <option value="Tarix">Tarix</option>
        </select>
        <input type="number" id="testCode" placeholder="Test kodi (Masalan: 11)">
        <button onclick="nextStep(3)">Keyingi</button>
    </div>

    <div id="step3" class="step">
        <h3>Testlar soni (10-90) va Baholash</h3>
        <input type="number" id="testCount" min="10" max="90" placeholder="Masalan: 30">
        <select id="gradeMode">
            <option value="umumiy">Umumiy (1 ball)</option>
            <option value="mahsus">Mahsus (1.1, 2.1, 3.1 ball)</option>
        </select>
        <button onclick="nextStep(4)">Testni kiritish</button>
    </div>

    <div id="step4" class="step">
        <h3>Javoblaringizni kiriting</h3>
        <p>Javoblarni bo'shluqsiz yozing (Masalan: ABCDABCD)</p>
        <input type="text" id="answers" style="text-transform: uppercase;">
        <button onclick="submitData()">Testni Yakunlash va Jo'natish</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function nextStep(step) {
            document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');
        }

        function submitData() {
            let data = {
                fullName: document.getElementById('fullName').value,
                subject: document.getElementById('subject').value,
                testCode: document.getElementById('testCode').value,
                testCount: document.getElementById('testCount').value,
                gradeMode: document.getElementById('gradeMode').value,
                answers: document.getElementById('answers').value.toUpperCase()
            };
            // Ma'lumotni botga qaytarish
            tg.sendData(JSON.stringify(data)); 
        }
    </script>
</body>
</html>
